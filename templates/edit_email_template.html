<!DOCTYPE html>
<html lang="de" class="light-mode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Mail-Vorlage bearbeiten</title>
  <link href="/static/dist/output.css" rel="stylesheet">
  <script>
    function setTheme(theme) {
      document.body.classList.remove('dark-mode', 'light-mode');
      document.body.classList.add(theme+'-mode');
      localStorage.setItem('theme', theme);
    }
    window.onload = function() {
      const theme = localStorage.getItem('theme') || 'light';
      setTheme(theme);
    }
  </script>
</head>
<body class="light-mode min-h-screen" style="background: var(--bg-primary); color: var(--text-primary);">
  <div class="container mx-auto px-6">
    <div class="glass p-8 mt-12 mb-8 max-w-xl mx-auto">
      <h1 class="text-3xl font-bold mb-6">Vorlage bearbeiten</h1>
      <form action="" method="post" class="flex flex-col gap-4">
        <input type="text" name="name" value="{{ tpl.name }}" required>
        <input type="text" name="subject" value="{{ tpl.subject }}" required>
        <textarea name="body" rows="8" required>{{ tpl.body }}</textarea>
        <button type="submit" class="transition-custom">Speichern</button>
      </form>
      <a href="/workspace/{{ workspace_id }}/email_templates" class="opacity-60 text-sm">Zurück zu den Vorlagen</a>
    </div>
  </div>
</body>
</html>
