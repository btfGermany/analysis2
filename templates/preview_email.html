<!DOCTYPE html>
<html lang="de" class="light-mode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Mail Vorschau</title>
  <link href="/static/dist/output.css" rel="stylesheet">
  <script>
    function setTheme(theme) {
      document.body.classList.remove('dark-mode', 'light-mode');
      document.body.classList.add(theme+'-mode');
      localStorage.setItem('theme', theme);
    }
    window.onload = function() {
      const theme = localStorage.getItem('theme') || 'light';
      setTheme(theme);
    }
  </script>
</head>
<body class="light-mode min-h-screen" style="background: var(--bg-primary); color: var(--text-primary);">
  <div class="container mx-auto px-6">
    <div class="glass p-8 mt-12 mb-8 max-w-2xl mx-auto">
      <h1 class="text-3xl font-bold mb-6">E-Mail Vorschau</h1>
      <div class="mb-4">
        <div class="font-bold">Betreff:</div>
        <div class="mb-2">{{ subject }}</div>
        <div class="font-bold">Inhalt:</div>
        <div class="glass p-4" style="white-space: pre-line;">{{ body|safe }}</div>
      </div>
      <a href="javascript:history.back()" class="opacity-60 text-sm">Zurück</a>
    </div>
  </div>
</body>
</html>
